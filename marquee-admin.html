<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notice Board | একতা একাডেমি</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Segoe UI',sans-serif;
}

body{
  min-height:100vh;
  padding:25px;
  background:
  linear-gradient(rgba(4,18,48,0.9),rgba(4,18,48,0.9)),
  url('https://images.unsplash.com/photo-1523050854058-8df90110c9f1?q=80&w=1200&auto=format&fit=crop') center/cover;
}

/* ===== MAIN BOX ===== */

.notice-container{
  width:100%;
  max-width:950px;
  margin:auto;
  background:white;
  border-radius:30px;
  overflow:hidden;
  box-shadow:0 20px 45px rgba(0,0,0,0.3);
  animation:fade 0.7s ease;
}

/* ===== TOP ===== */

.notice-top{
  padding:40px 30px;
  text-align:center;
  color:white;
  background:linear-gradient(135deg,#071f4e,#0e3b8c,#1d4ed8);
}

.notice-top h1{
  font-size:42px;
  margin-bottom:12px;
}

.notice-top p{
  font-size:18px;
  line-height:1.8;
  opacity:0.95;
}

/* ===== NOTICE SECTION ===== */

.notice-body{
  padding:40px 30px;
}

/* ===== NOTICE ITEM ===== */

.notice-item{
  display:flex;
  gap:20px;
  align-items:flex-start;
  background:#f3f7ff;
  margin-bottom:22px;
  padding:24px;
  border-radius:22px;
  border-left:6px solid #1d4ed8;
  transition:0.3s;
}

.notice-item:hover{
  transform:translateY(-4px);
  box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

/* ===== NUMBER ===== */

.notice-number{
  min-width:55px;
  height:55px;
  border-radius:50%;
  background:linear-gradient(135deg,#071f4e,#1d4ed8);
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:22px;
  font-weight:700;
  box-shadow:0 5px 15px rgba(0,0,0,0.15);
}

/* ===== TEXT ===== */

.notice-text{
  flex:1;
}

.notice-text h2{
  color:#071f4e;
  margin-bottom:10px;
  font-size:24px;
}

.notice-text p{
  color:#333;
  font-size:18px;
  line-height:1.9;
}

/* ===== FOOTER ===== */

.notice-footer{
  text-align:center;
  padding:0 30px 40px;
}

.notice-footer a{
  text-decoration:none;
  background:#071f4e;
  color:white;
  padding:15px 35px;
  border-radius:40px;
  display:inline-block;
  font-weight:700;
  transition:0.3s;
}

.notice-footer a:hover{
  transform:translateY(-4px);
  background:#1d4ed8;
}

/* ===== ANIMATION ===== */

@keyframes fade{

  from{
    opacity:0;
    transform:translateY(40px);
  }

  to{
    opacity:1;
    transform:translateY(0);
  }

}

/* ===== MOBILE ===== */

@media(max-width:768px){

.notice-top h1{
  font-size:30px;
}

.notice-top p{
  font-size:16px;
}

.notice-body{
  padding:25px 18px;
}

.notice-item{
  flex-direction:column;
  gap:15px;
}

.notice-number{
  width:50px;
  height:50px;
  font-size:20px;
}

.notice-text h2{
  font-size:21px;
}

.notice-text p{
  font-size:16px;
}

}

</style>
</head>

<body>

<div class="notice-container">

<!-- ===== TOP ===== -->

<div class="notice-top">

<h1>📢 Notice Board</h1>

<p>
একতা একাডেমির সকল গুরুত্বপূর্ণ Notice নিচে ধারাবাহিকভাবে দেওয়া হলো
</p>

</div>

<!-- ===== BODY ===== -->

<div class="notice-body" id="noticeList">

<!-- Notice will come here -->

</div>

<!-- ===== FOOTER ===== -->

<div class="notice-footer">

<a href="index.html">
🏠 Back To Website
</a>

</div>

</div>

<script>

/* ===== DEFAULT NOTICES ===== */

const defaultNotices = [

"একতা একাডেমিতে নতুন ব্যাচে ভর্তি চলছে",

"SSC ও HSC বিশেষ কোচিং কার্যক্রম শুরু হয়েছে",

"সীমিত আসনে ভর্তি চলছে",

"প্রতি শুক্রবার সাপ্তাহিক মডেল টেস্ট অনুষ্ঠিত হবে",

"ভর্তি সংক্রান্ত তথ্যের জন্য অফিসে যোগাযোগ করুন"

];

/* ===== GET SAVED NOTICE ===== */

const savedNotice = localStorage.getItem('ekota_notice');

/* ===== NOTICE ARRAY ===== */

let noticeArray = [];

if(savedNotice){

  noticeArray = savedNotice.split('•');

}
else{

  noticeArray = defaultNotices;

}

/* ===== SHOW NOTICES ===== */

const noticeList = document.getElementById('noticeList');

noticeArray.forEach((notice,index)=>{

  noticeList.innerHTML += `

  <div class="notice-item">

    <div class="notice-number">
      ${index + 1}
    </div>

    <div class="notice-text">

      <h2>নোটিশ ${index + 1}</h2>

      <p>${notice.trim()}</p>

    </div>

  </div>

  `;

});

</script>

</body>
</html>

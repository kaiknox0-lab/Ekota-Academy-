<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forgot Password</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Segoe UI',sans-serif;
}

body{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#071f4e,#0e3b8c,#123f96);
  overflow:hidden;
  padding:20px;
}

/* ===== BACKGROUND GLOW ===== */

.bg-light{
  position:absolute;
  width:500px;
  height:500px;
  border-radius:50%;
  background:rgba(255,255,255,0.06);
  filter:blur(40px);
  animation:pulse 5s ease-in-out infinite;
}

/* ===== MAIN BOX ===== */

.box{
  position:relative;
  z-index:2;
  width:100%;
  max-width:450px;
  background:rgba(255,255,255,0.12);
  backdrop-filter:blur(12px);
  border-radius:28px;
  padding:40px;
  box-shadow:0 15px 35px rgba(0,0,0,0.25);
  border:1px solid rgba(255,255,255,0.15);
}

/* ===== ANIMATED MAN ===== */

.man-area{
  width:100%;
  display:flex;
  justify-content:center;
  margin-bottom:20px;
}

.man{
  position:relative;
  width:170px;
  height:170px;
  animation:float 3s ease-in-out infinite;
}

/* HEAD */

.head{
  position:absolute;
  top:8px;
  left:64px;
  width:42px;
  height:42px;
  border-radius:50%;
  background:#ffd2a6;
  z-index:3;
}

/* BODY */

.body{
  position:absolute;
  top:48px;
  left:52px;
  width:65px;
  height:70px;
  background:#ffd86b;
  border-radius:18px;
}

/* HANDS */

.hand-left,
.hand-right{
  position:absolute;
  width:45px;
  height:10px;
  background:#ffd2a6;
  top:68px;
  border-radius:10px;
  transform-origin:left center;
}

.hand-left{
  left:18px;
  transform:rotate(25deg);
}

.hand-right{
  left:102px;
  transform:rotate(-35deg);
  animation:keyMove 1.5s ease-in-out infinite;
}

/* LEGS */

.leg-left,
.leg-right{
  position:absolute;
  width:12px;
  height:55px;
  background:#8ec5ff;
  top:112px;
  border-radius:10px;
}

.leg-left{
  left:62px;
}

.leg-right{
  left:94px;
}

/* KEY */

.key{
  position:absolute;
  top:38px;
  left:138px;
  width:48px;
  height:18px;
  background:#fff;
  border-radius:10px;
}

.key::before{
  content:'';
  position:absolute;
  left:-18px;
  top:-8px;
  width:24px;
  height:24px;
  border:6px solid #fff;
  border-radius:50%;
}

.key::after{
  content:'';
  position:absolute;
  right:-8px;
  top:5px;
  width:14px;
  height:6px;
  background:#fff;
  box-shadow:-8px 6px 0 #fff;
}

/* ===== TEXT ===== */

.box h2{
  text-align:center;
  color:white;
  margin-bottom:18px;
  font-size:36px;
}

.box p{
  text-align:center;
  margin-bottom:25px;
  color:#e2ebff;
  line-height:1.7;
}

/* ===== INPUT ===== */

.input-box{
  margin-bottom:20px;
}

.input-box label{
  display:block;
  margin-bottom:8px;
  font-weight:700;
  color:white;
}

.input-box input{
  width:100%;
  padding:15px;
  border:none;
  border-radius:12px;
  outline:none;
  font-size:16px;
}

/* ===== BUTTON ===== */

.reset-btn{
  width:100%;
  padding:15px;
  border:none;
  border-radius:14px;
  background:#ffd86b;
  color:#071f4e;
  font-size:18px;
  font-weight:700;
  cursor:pointer;
  transition:0.3s;
}

.reset-btn:hover{
  background:white;
  transform:translateY(-3px);
}

/* ===== BACK ===== */

.back{
  text-align:center;
  margin-top:25px;
}

.back a{
  text-decoration:none;
  color:white;
  font-weight:700;
}

/* ===== ANIMATIONS ===== */

@keyframes float{

  0%{
    transform:translateY(0px);
  }

  50%{
    transform:translateY(-10px);
  }

  100%{
    transform:translateY(0px);
  }

}

@keyframes keyMove{

  0%{
    transform:rotate(-35deg);
  }

  50%{
    transform:rotate(-15deg);
  }

  100%{
    transform:rotate(-35deg);
  }

}

@keyframes pulse{

  0%{
    transform:scale(1);
  }

  50%{
    transform:scale(1.1);
  }

  100%{
    transform:scale(1);
  }

}

@media(max-width:768px){

.box{
  padding:30px;
}

.box h2{
  font-size:30px;
}

.man{
  transform:scale(0.9);
}

}

</style>
</head>

<body>

<div class="bg-light"></div>

<div class="box">

<!-- ANIMATED MAN -->

<div class="man-area">

<div class="man">

<div class="head"></div>

<div class="body"></div>

<div class="hand-left"></div>

<div class="hand-right"></div>

<div class="leg-left"></div>

<div class="leg-right"></div>

<div class="key"></div>

</div>

</div>

<h2>Forgot Password</h2>

<p>
আপনার মোবাইল নাম্বার দিয়ে পাসওয়ার্ড রিসেট করুন।
</p>

<div class="input-box">
<label>মোবাইল নাম্বার</label>
<input type="text" placeholder="01XXXXXXXXX">
</div>

<button class="reset-btn">
Reset Password
</button>

<div class="back">
<a href="login.html">← Back To Login</a>
</div>

</div>

</body>
</html>

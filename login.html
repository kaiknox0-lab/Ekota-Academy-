<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Login</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Segoe UI',sans-serif;
}

body{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#071f4e,#0e3b8c,#123f96);
  overflow:hidden;
  position:relative;
}

/* ===== ANIMATED BACKGROUND ===== */

.bg-animation{
  position:absolute;
  inset:0;
  overflow:hidden;
  z-index:0;
}

/* ROAD */

.road{
  position:absolute;
  bottom:0;
  width:100%;
  height:140px;
  background:#1b1b1b;
}

.road::before{
  content:'';
  position:absolute;
  top:50%;
  left:0;
  width:200%;
  height:6px;
  background:
  repeating-linear-gradient(
    to right,
    #fff 0 50px,
    transparent 50px 100px
  );
  animation:roadMove 3s linear infinite;
}

/* CARTOON BOY */

.cycle-wrapper{
  position:absolute;
  bottom:75px;
  left:-250px;
  animation:moveRight 12s linear infinite alternate;
}

.boy{
  position:relative;
  width:220px;
  height:120px;
}

/* HEAD */

.head{
  position:absolute;
  top:8px;
  left:90px;
  width:38px;
  height:38px;
  background:#ffd2a6;
  border-radius:50%;
  z-index:3;
}

/* BODY */

.body{
  position:absolute;
  top:42px;
  left:82px;
  width:55px;
  height:45px;
  background:#ffd86b;
  border-radius:14px;
  transform:rotate(10deg);
}

/* HAND */

.hand{
  position:absolute;
  top:50px;
  left:118px;
  width:35px;
  height:8px;
  background:#ffd2a6;
  transform:rotate(15deg);
  border-radius:10px;
}

/* LEG */

.leg1,
.leg2{
  position:absolute;
  width:45px;
  height:8px;
  background:#8ec5ff;
  top:85px;
  left:90px;
  border-radius:10px;
  transform-origin:left center;
}

.leg1{
  animation:pedal1 0.6s linear infinite;
}

.leg2{
  animation:pedal2 0.6s linear infinite;
}

/* BICYCLE */

.wheel{
  position:absolute;
  bottom:0;
  width:65px;
  height:65px;
  border:6px solid #fff;
  border-radius:50%;
  animation:spin 1s linear infinite;
}

.wheel.left{
  left:20px;
}

.wheel.right{
  right:20px;
}

.frame1,
.frame2,
.frame3{
  position:absolute;
  background:#ffffff;
  height:5px;
  border-radius:10px;
}

.frame1{
  width:80px;
  top:78px;
  left:52px;
  transform:rotate(12deg);
}

.frame2{
  width:70px;
  top:78px;
  left:95px;
  transform:rotate(-28deg);
}

.frame3{
  width:60px;
  top:62px;
  left:82px;
  transform:rotate(18deg);
}

/* LOGIN BOX */

.login-box{
  position:relative;
  z-index:2;
  width:100%;
  max-width:450px;
  background:rgba(255,255,255,0.15);
  backdrop-filter:blur(12px);
  border-radius:25px;
  padding:40px;
  box-shadow:0 15px 35px rgba(0,0,0,0.3);
  border:1px solid rgba(255,255,255,0.2);
}

.login-box h2{
  text-align:center;
  color:white;
  margin-bottom:30px;
  font-size:38px;
}

.input-box{
  margin-bottom:20px;
}

.input-box label{
  display:block;
  margin-bottom:8px;
  font-weight:700;
  color:white;
}

.input-box input,
.input-box select{
  width:100%;
  padding:15px;
  border:none;
  border-radius:12px;
  outline:none;
  font-size:16px;
}

.login-btn{
  width:100%;
  padding:15px;
  border:none;
  border-radius:14px;
  background:#ffd86b;
  color:#071f4e;
  font-size:18px;
  font-weight:700;
  cursor:pointer;
  margin-top:10px;
  transition:0.3s;
}

.login-btn:hover{
  background:white;
  transform:translateY(-2px);
}

/* FORGOT + SIGNUP */

.bottom-links{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-top:18px;
  gap:15px;
}

.forgot a{
  text-decoration:none;
  color:#ffffff;
  font-weight:700;
  font-size:15px;
  transition:0.3s;
}

.forgot a:hover{
  color:#ffd86b;
}

/* BEAUTIFUL SIGNUP BUTTON */

.signup a{
  text-decoration:none;
  display:inline-block;
  padding:12px 28px;
  border-radius:50px;
  background:linear-gradient(135deg,#ffd86b,#ffb347);
  color:#071f4e;
  font-weight:800;
  font-size:15px;
  letter-spacing:0.5px;
  box-shadow:
  0 5px 15px rgba(255,216,107,0.4),
  inset 0 1px 1px rgba(255,255,255,0.6);
  transition:all 0.35s ease;
  position:relative;
  overflow:hidden;
}

/* GLOW EFFECT */

.signup a::before{
  content:'';
  position:absolute;
  top:0;
  left:-120%;
  width:100%;
  height:100%;
  background:rgba(255,255,255,0.4);
  transform:skewX(-25deg);
  transition:0.5s;
}

.signup a:hover::before{
  left:120%;
}

.signup a:hover{
  transform:translateY(-3px) scale(1.05);
  box-shadow:
  0 10px 25px rgba(255,216,107,0.6),
  0 0 20px rgba(255,255,255,0.4);
}

.back{
  text-align:center;
  margin-top:25px;
}

.back a{
  text-decoration:none;
  color:#fff;
  font-weight:700;
}

/* ===== ANIMATIONS ===== */

@keyframes roadMove{
  from{
    transform:translateX(0);
  }

  to{
    transform:translateX(-100px);
  }
}

@keyframes spin{
  from{
    transform:rotate(0deg);
  }

  to{
    transform:rotate(360deg);
  }
}

@keyframes pedal1{
  0%{
    transform:rotate(25deg);
  }

  50%{
    transform:rotate(-25deg);
  }

  100%{
    transform:rotate(25deg);
  }
}

@keyframes pedal2{
  0%{
    transform:rotate(-25deg);
  }

  50%{
    transform:rotate(25deg);
  }

  100%{
    transform:rotate(-25deg);
  }
}

@keyframes moveRight{

  0%{
    left:-250px;
    transform:scaleX(1);
  }

  45%{
    left:110%;
    transform:scaleX(1);
  }

  50%{
    left:110%;
    transform:scaleX(-1);
  }

  95%{
    left:-250px;
    transform:scaleX(-1);
  }

  100%{
    left:-250px;
    transform:scaleX(1);
  }

}

/* MOBILE */

@media(max-width:768px){

.login-box{
  width:92%;
  padding:30px;
}

.login-box h2{
  font-size:30px;
}

.cycle-wrapper{
  transform:scale(0.8);
}

.bottom-links{
  flex-direction:row;
  justify-content:space-between;
}

.signup a{
  padding:10px 22px;
  font-size:14px;
}

}

</style>
</head>

<body>

<!-- BACKGROUND ANIMATION -->

<div class="bg-animation">

<div class="cycle-wrapper">

<div class="boy">

<div class="head"></div>

<div class="body"></div>

<div class="hand"></div>

<div class="leg1"></div>

<div class="leg2"></div>

<div class="wheel left"></div>

<div class="wheel right"></div>

<div class="frame1"></div>

<div class="frame2"></div>

<div class="frame3"></div>

</div>

</div>

<div class="road"></div>

</div>

<!-- LOGIN BOX -->

<div class="login-box">

<h2>Student Login</h2>

<div class="input-box">
<label>মোবাইল নাম্বার</label>
<input type="text" placeholder="01XXXXXXXXX">
</div>

<div class="input-box">

<label>Class</label>

<select>
<option>Select Class</option>
<option>Class 6</option>
<option>Class 7</option>
<option>Class 8</option>
<option>Class 9-10</option>
<option>Class 11-12</option>
</select>

</div>

<div class="input-box">
<label>Password</label>
<input type="password" placeholder="Enter Password">
</div>

<button class="login-btn">Login</button>

<!-- FORGOT + SIGNUP -->

<div class="bottom-links">

<div class="forgot">
<a href="forgot-password.html">Forgot Password?</a>
</div>

<div class="signup">
<a href="signup.html">Sign Up</a>
</div>

</div>

<div class="back">
<a href="index.html">← Back To Home</a>
</div>

</div>

</body>
</html>

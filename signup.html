<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Sign Up</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Segoe UI',sans-serif;
}

body{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#071f4e,#0e3b8c,#123f96);
  padding:30px 15px;
}

/* SIGNUP BOX */

.signup-box{
  width:100%;
  max-width:700px;
  background:rgba(255,255,255,0.15);
  backdrop-filter:blur(12px);
  border-radius:25px;
  padding:40px;
  box-shadow:0 15px 35px rgba(0,0,0,0.3);
  border:1px solid rgba(255,255,255,0.2);
}

.signup-box h2{
  text-align:center;
  color:#fff;
  margin-bottom:30px;
  font-size:38px;
}

/* INPUT */

.form-group{
  margin-bottom:20px;
}

.form-group label{
  display:block;
  margin-bottom:8px;
  color:#fff;
  font-weight:700;
}

.form-group input,
.form-group select,
.form-group textarea{
  width:100%;
  padding:15px;
  border:none;
  border-radius:12px;
  outline:none;
  font-size:16px;
}

textarea{
  resize:none;
  height:100px;
}

/* TWO COLUMN */

.row{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
}

/* RADIO */

.gender-box{
  display:flex;
  gap:20px;
  color:#fff;
  font-weight:700;
  margin-top:10px;
}

/* BUTTON */

.signup-btn{
  width:100%;
  padding:16px;
  border:none;
  border-radius:14px;
  background:linear-gradient(135deg,#ffd86b,#ffb347);
  color:#071f4e;
  font-size:18px;
  font-weight:800;
  cursor:pointer;
  margin-top:10px;
  transition:0.3s;
}

.signup-btn:hover{
  transform:translateY(-3px);
  background:#fff;
}

/* MESSAGE */

.message{
  margin-top:18px;
  text-align:center;
  font-weight:700;
  color:white;
}

/* BACK */

.back{
  text-align:center;
  margin-top:25px;
}

.back a{
  text-decoration:none;
  color:#fff;
  font-weight:700;
}

/* MOBILE */

@media(max-width:768px){

.signup-box{
  padding:25px;
}

.signup-box h2{
  font-size:30px;
}

.row{
  grid-template-columns:1fr;
}

}

</style>
</head>

<body>

<div class="signup-box">

<h2>Coaching Admission Form</h2>

<form id="signupForm">

<div class="form-group">
<label>Student Full Name</label>
<input type="text" id="studentName" placeholder="Enter Full Name">
</div>

<div class="row">

<div class="form-group">
<label>Father's Name</label>
<input type="text" id="fatherName" placeholder="Father Name">
</div>

<div class="form-group">
<label>Mother's Name</label>
<input type="text" id="motherName" placeholder="Mother Name">
</div>

</div>

<div class="row">

<div class="form-group">
<label>Student Mobile Number</label>
<input type="text" id="studentMobile" placeholder="01XXXXXXXXX">
</div>

<div class="form-group">
<label>Guardian Mobile Number</label>
<input type="text" id="guardianMobile" placeholder="01XXXXXXXXX">
</div>

</div>

<div class="row">

<div class="form-group">
<label>Select Class</label>

<select id="studentClass">
<option value="">Select Class</option>
<option>Class 6</option>
<option>Class 7</option>
<option>Class 8</option>
<option>Class 9-10</option>
<option>Class 11-12</option>
</select>

</div>

<div class="form-group">
<label>School / College Name</label>
<input type="text" id="schoolName" placeholder="School or College Name">
</div>

</div>

<div class="row">

<div class="form-group">
<label>Date of Birth</label>
<input type="date" id="dob">
</div>

<div class="form-group">
<label>Gender</label>

<div class="gender-box">
<label><input type="radio" name="gender" value="Male"> Male</label>
<label><input type="radio" name="gender" value="Female"> Female</label>
</div>

</div>

</div>

<div class="form-group">
<label>Home Address</label>
<textarea id="address" placeholder="Enter Full Address"></textarea>
</div>

<div class="row">

<div class="form-group">
<label>Create Password</label>
<input type="password" id="password" placeholder="Create Password">
</div>

<div class="form-group">
<label>Confirm Password</label>
<input type="password" id="confirmPassword" placeholder="Confirm Password">
</div>

</div>

<div class="form-group">
<label>Upload Student Photo</label>
<input type="file" id="photo">
</div>

<button type="submit" class="signup-btn">
Submit Admission Form
</button>

<div class="message" id="message"></div>

</form>

<div class="back">
<a href="login.html">← Back To Login</a>
</div>

</div>

<!-- JAVASCRIPT -->

<script>

const signupForm = document.getElementById('signupForm');
const message = document.getElementById('message');

signupForm.addEventListener('submit', function(e){

  e.preventDefault();

  // INPUT VALUES

  const studentName = document.getElementById('studentName').value.trim();
  const fatherName = document.getElementById('fatherName').value.trim();
  const motherName = document.getElementById('motherName').value.trim();

  const studentMobile = document.getElementById('studentMobile').value.trim();
  const guardianMobile = document.getElementById('guardianMobile').value.trim();

  const studentClass = document.getElementById('studentClass').value;
  const schoolName = document.getElementById('schoolName').value.trim();

  const dob = document.getElementById('dob').value;
  const address = document.getElementById('address').value.trim();

  const password = document.getElementById('password').value;
  const confirmPassword = document.getElementById('confirmPassword').value;

  const photo = document.getElementById('photo').files[0];

  const gender = document.querySelector('input[name="gender"]:checked');

  // MOBILE VALIDATION

  const mobilePattern = /^01[0-9]{9}$/;

  // EMPTY CHECK

  if(
    studentName === '' ||
    fatherName === '' ||
    motherName === '' ||
    studentMobile === '' ||
    guardianMobile === '' ||
    studentClass === '' ||
    schoolName === '' ||
    dob === '' ||
    address === '' ||
    password === '' ||
    confirmPassword === ''
  ){

    message.innerHTML = 'সব তথ্য পূরণ করুন';
    message.style.color = '#ffb3b3';
    return;

  }

  // GENDER CHECK

  if(!gender){

    message.innerHTML = 'Gender নির্বাচন করুন';
    message.style.color = '#ffb3b3';
    return;

  }

  // MOBILE CHECK

  if(
    !mobilePattern.test(studentMobile) ||
    !mobilePattern.test(guardianMobile)
  ){

    message.innerHTML = 'সঠিক মোবাইল নাম্বার দিন';
    message.style.color = '#ffb3b3';
    return;

  }

  // PASSWORD LENGTH

  if(password.length < 6){

    message.innerHTML = 'পাসওয়ার্ড কমপক্ষে ৬ অক্ষরের হতে হবে';
    message.style.color = '#ffb3b3';
    return;

  }

  // PASSWORD MATCH

  if(password !== confirmPassword){

    message.innerHTML = 'পাসওয়ার্ড মিলছে না';
    message.style.color = '#ffb3b3';
    return;

  }

  // PHOTO CHECK

  if(!photo){

    message.innerHTML = 'ছবি আপলোড করুন';
    message.style.color = '#ffb3b3';
    return;

  }

  // SUCCESS

  message.innerHTML = 'Admission Form Successfully Submitted ✅';
  message.style.color = '#b8ffb8';

  // RESET FORM

  signupForm.reset();

  // REDIRECT EXAMPLE

  setTimeout(() => {

    window.location.href = 'login.html';

  }, 2000);

});

</script>

</body>
</html>

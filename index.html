<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ekota Academy Admission</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial,sans-serif;
    }

    body{
      background:linear-gradient(135deg,#0f172a,#1e293b);
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      padding:20px;
    }

    .container{
      width:100%;
      max-width:500px;
      background:#ffffff;
      padding:30px;
      border-radius:20px;
      box-shadow:0 10px 30px rgba(0,0,0,0.2);
    }

    .logo{
      text-align:center;
      margin-bottom:25px;
    }

    .logo h1{
      font-size:34px;
      color:#0f172a;
      margin-bottom:5px;
    }

    .logo p{
      color:#6b7280;
      font-size:15px;
    }

    .input-group{
      margin-bottom:16px;
    }

    .input-group label{
      display:block;
      margin-bottom:6px;
      font-weight:bold;
      color:#111827;
    }

    .input-group input,
    .input-group select,
    .input-group textarea{
      width:100%;
      padding:13px;
      border:1px solid #d1d5db;
      border-radius:10px;
      outline:none;
      font-size:15px;
    }

    .input-group input:focus,
    .input-group select:focus,
    .input-group textarea:focus{
      border-color:#2563eb;
    }

    button{
      width:100%;
      padding:14px;
      border:none;
      border-radius:10px;
      background:#2563eb;
      color:white;
      font-size:16px;
      cursor:pointer;
      transition:0.3s;
      font-weight:bold;
    }

    button:hover{
      background:#1d4ed8;
    }

    .loading{
      display:none;
      margin-top:15px;
      text-align:center;
      color:#2563eb;
      font-weight:bold;
    }

    .success{
      display:none;
      margin-top:15px;
      background:#dcfce7;
      color:#166534;
      padding:12px;
      border-radius:10px;
      text-align:center;
      font-weight:bold;
    }

    .footer{
      margin-top:20px;
      text-align:center;
      color:#6b7280;
      font-size:14px;
    }

  </style>
</head>
<body>

  <div class="container">

    <div class="logo">
      <h1>Ekota Academy</h1>
      <p>Online Student Admission Form</p>
    </div>

    <form id="studentForm">

      <div class="input-group">
        <label>Student Name</label>
        <input type="text" id="name" placeholder="Enter student name" required>
      </div>

      <div class="input-group">
        <label>Father Name</label>
        <input type="text" id="father" placeholder="Enter father name" required>
      </div>

      <div class="input-group">
        <label>Mother Name</label>
        <input type="text" id="mother" placeholder="Enter mother name" required>
      </div>

      <div class="input-group">
        <label>Phone Number</label>
        <input type="tel" id="phone" placeholder="01XXXXXXXXX" required>
      </div>

      <div class="input-group">
        <label>Select Class</label>

        <select id="studentClass" required>
          <option value="">Choose Class</option>
          <option>Play</option>
          <option>Nursery</option>
          <option>KG</option>
          <option>Class 1</option>
          <option>Class 2</option>
          <option>Class 3</option>
          <option>Class 4</option>
          <option>Class 5</option>
          <option>Class 6</option>
          <option>Class 7</option>
          <option>Class 8</option>
          <option>Class 9</option>
          <option>Class 10</option>
        </select>

      </div>

      <div class="input-group">
        <label>Address</label>
        <textarea id="address" rows="4" placeholder="Enter address"></textarea>
      </div>

      <button type="submit" id="submitBtn">
        Submit Admission
      </button>

      <div class="loading" id="loading">
        Saving Student Data...
      </div>

      <div class="success" id="success">
        Admission Submitted Successfully ✅
      </div>

    </form>

    <div class="footer">
      © 2026 Ekota Academy
    </div>

  </div>

<script>

const SCRIPT_URL = "PASTE_YOUR_GOOGLE_SCRIPT_URL_HERE";

const form = document.getElementById("studentForm");
const loading = document.getElementById("loading");
const success = document.getElementById("success");
const submitBtn = document.getElementById("submitBtn");

form.addEventListener("submit", async (e) => {

  e.preventDefault();

  loading.style.display = "block";
  success.style.display = "none";
  submitBtn.disabled = true;

  const formData = {
    name: document.getElementById("name").value,
    father: document.getElementById("father").value,
    mother: document.getElementById("mother").value,
    phone: document.getElementById("phone").value,
    studentClass: document.getElementById("studentClass").value,
    address: document.getElementById("address").value
  };

  try {

    const response = await fetch(SCRIPT_URL, {
      method: "POST",
      body: JSON.stringify(formData)
    });

    const result = await response.json();

    loading.style.display = "none";

    if(result.result === "success"){

      success.style.display = "block";

      form.reset();

    } else {

      alert("Error Saving Data");

    }

  } catch(error){

    loading.style.display = "none";

    alert("Connection Error");

    console.error(error);

  }

  submitBtn.disabled = false;

});

</script>

</body>
</html>
